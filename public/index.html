<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Holdings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0c10;
            color: #e4e6eb;
            padding: 1rem;
        }
        .navbar {
            background: #0a0c10;
            border-bottom: 1px solid #00ff88;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .navbar a, .navbar button {
            color: #00ff88;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .page { display: none; }
        .page.active { display: block; }
        .card {
            background: #1a1c22;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .btn {
            background: #00ff88;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-danger { background: #ff3b30; color: white; }
        input {
            background: #2a2c32;
            border: 1px solid #00ff88;
            padding: 0.5rem;
            border-radius: 8px;
            color: white;
            margin: 0.5rem 0;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }
        @media (min-width: 768px) {
            .stats-grid { grid-template-columns: repeat(4,1fr); }
        }
        .stat-card {
            background: #2a2c32;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #00ff88; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #333; }
        .price-up { color: #00ff88; }
        .price-down { color: #ff3b30; }
        .trade-input { width: 70px; padding: 0.3rem; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1c22;
            border: 1px solid #00ff88;
            border-radius: 12px;
            padding: 1.5rem;
            width: 90%;
            max-width: 300px;
            text-align: center;
        }
        .auth-box { max-width: 400px; margin: 2rem auto; padding: 2rem; background: #1a1c22; border-radius: 12px; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo" style="font-size:1.5rem; font-weight:bold; color:#00ff88;">APEX</div>
    <div style="display:flex; gap:1rem; flex-wrap:wrap;">
        <a onclick="showPage('dashboard')">Dashboard</a>
        <a onclick="showPage('trade')">Trade</a>
        <a onclick="showPage('portfolio')">Portfolio</a>
        <a onclick="showPage('profile')">Profile</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<!-- Auth Page -->
<div id="authPage" class="page active">
    <div class="auth-box">
        <h2 id="authTitle">Login</h2>
        <div id="authMsg" style="color:#ff3b30; margin-bottom:1rem;"></div>
        <input type="text" id="authUsername" placeholder="Username" style="width:100%;"><br>
        <input type="password" id="authPassword" placeholder="Password" style="width:100%;"><br>
        <button class="btn" style="width:100%; margin-top:1rem;" onclick="handleAuth()">Login</button>
        <p style="margin-top:1rem; text-align:center;"><a onclick="toggleMode()" style="color:#00ff88; cursor:pointer;">Create Account</a></p>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboardPage" class="page">
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="cashVal">$0</div><div>Cash</div></div>
        <div class="stat-card"><div class="stat-value" id="portVal">$0</div><div>Portfolio</div></div>
        <div class="stat-card"><div class="stat-value" id="totalVal">$0</div><div>Net Worth</div></div>
        <div class="stat-card"><div class="stat-value" id="tierVal">Bronze</div><div>Tier</div></div>
    </div>
    <div class="card"><h3>💰 Cash</h3><input type="number" id="amountInput" placeholder="Amount"><button class="btn" onclick="deposit()">Deposit</button><button class="btn-danger" onclick="withdraw()">Withdraw</button></div>
    <div class="card"><h3>📊 Market</h3><div id="marketList"></div></div>
</div>

<!-- Trade -->
<div id="tradePage" class="page">
    <div class="card"><h3>💹 Trade</h3><div id="tradeList"></div></div>
</div>

<!-- Portfolio -->
<div id="portfolioPage" class="page">
    <div class="card"><h3>📋 Holdings</h3><div id="holdingsList"></div></div>
    <div class="card"><h3>📜 History</h3><div id="historyList"></div></div>
</div>

<!-- Profile -->
<div id="profilePage" class="page">
    <div class="card"><h3>👤 Profile</h3><input type="text" id="editName" placeholder="Username"><input type="email" id="editEmail" placeholder="Email"><button class="btn" onclick="updateProfile()">Update</button></div>
    <div class="card"><h3>🔒 Password</h3><input type="password" id="oldPwd" placeholder="Current"><input type="password" id="newPwd" placeholder="New"><input type="password" id="confirmPwd" placeholder="Confirm"><button class="btn" onclick="changePwd()">Change</button></div>
</div>

<!-- Modal -->
<div id="modal" class="modal"><div class="modal-content"><h3 id="modalTitle">Confirm</h3><p id="modalMsg"></p><input type="password" id="modalPwd" placeholder="Password"><button class="btn" onclick="confirmAction()">Confirm</button><button class="btn-danger" onclick="closeModal()">Cancel</button></div></div>

<script>
// DATA
let users = JSON.parse(localStorage.getItem('apex_users') || '[]');
let currentUser = null;
let pendingAction = null;

const stocks = [
    {symbol:'AAPL', name:'Apple', price:175},
    {symbol:'GOOGL', name:'Google', price:142},
    {symbol:'MSFT', name:'Microsoft', price:378},
    {symbol:'AMZN', name:'Amazon', price:145},
    {symbol:'TSLA', name:'Tesla', price:245}
];

function save() { localStorage.setItem('apex_users', JSON.stringify(users)); }

function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page+'Page').classList.add('active');
    if(page === 'dashboard') loadDashboard();
    if(page === 'trade') loadTrade();
    if(page === 'portfolio') { loadHoldings(); loadHistory(); }
    if(page === 'profile') loadProfile();
}

// AUTH
let isLogin = true;
function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('authTitle').innerText = isLogin ? 'Login' : 'Register';
}

function handleAuth() {
    const username = document.getElementById('authUsername').value;
    const password = document.getElementById('authPassword').value;
    if(isLogin) {
        const user = users.find(u => u.username === username && u.password === password);
        if(!user) { document.getElementById('authMsg').innerText = 'Invalid'; return; }
        currentUser = user;
        showPage('dashboard');
    } else {
        if(users.find(u => u.username === username)) { document.getElementById('authMsg').innerText = 'Username taken'; return; }
        const newUser = {
            id: Date.now(),
            username: username,
            email: username+'@email.com',
            password: password,
            cash: 0,
            tier: 1,
            portfolio: [],
            history: []
        };
        users.push(newUser);
        save();
        document.getElementById('authMsg').innerText = 'Account created! Login.';
        isLogin = true;
        document.getElementById('authTitle').innerText = 'Login';
        document.getElementById('authPassword').value = '';
    }
}

function logout() { currentUser = null; showPage('auth'); }

// DASHBOARD
function loadDashboard() {
    if(!currentUser) return;
    let portVal = 0;
    currentUser.portfolio.forEach(p => {
        const s = stocks.find(x => x.symbol === p.symbol);
        if(s) portVal += s.price * p.shares;
    });
    document.getElementById('cashVal').innerText = '$' + currentUser.cash;
    document.getElementById('portVal').innerText = '$' + portVal;
    document.getElementById('totalVal').innerText = '$' + (currentUser.cash + portVal);
    const tiers = {1:'Bronze',2:'Silver',3:'Gold'};
    document.getElementById('tierVal').innerText = tiers[currentUser.tier];
    
    let html = '<table><thead><tr><th>Symbol</th><th>Price</th><th>Change</th></tr></thead><tbody>';
    stocks.forEach(s => {
        let change = (Math.random() * 10 - 5).toFixed(2);
        html += `<tr><td>${s.symbol}</td><td>$${s.price}</td><td class="${change>=0?'price-up':'price-down'}">${change>=0?'+':''}${change}%</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('marketList').innerHTML = html;
}

// TRADE
function loadTrade() {
    let html = '<table><thead><tr><th>Symbol</th><th>Price</th><th>Shares</th><th>Action</th></tr></thead><tbody>';
    stocks.forEach(s => {
        html += `<tr>
            <td>${s.symbol}</td>
            <td>$${s.price}</td>
            <td><input type="number" id="qty_${s.symbol}" class="trade-input" value="1"></td>
            <td><button class="btn" onclick="buyStock('${s.symbol}')">Buy</button> <button class="btn-danger" onclick="sellStock('${s.symbol}')">Sell</button></td>
        </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('tradeList').innerHTML = html;
}

function buyStock(symbol) {
    const qty = parseInt(document.getElementById(`qty_${symbol}`).value);
    if(!qty) return;
    const stock = stocks.find(s => s.symbol === symbol);
    const cost = stock.price * qty;
    if(currentUser.cash < cost) { alert('Insufficient funds'); return; }
    pendingAction = { type:'buy', symbol, qty, cost, stockPrice: stock.price };
    document.getElementById('modalTitle').innerText = 'Confirm Buy';
    document.getElementById('modalMsg').innerText = `Buy ${qty} shares of ${symbol} for $${cost}?`;
    document.getElementById('modal').style.display = 'flex';
}

function sellStock(symbol) {
    const qty = parseInt(document.getElementById(`qty_${symbol}`).value);
    if(!qty) return;
    const holding = currentUser.portfolio.find(p => p.symbol === symbol);
    if(!holding || holding.shares < qty) { alert('Not enough shares'); return; }
    const stock = stocks.find(s => s.symbol === symbol);
    const value = stock.price * qty;
    pendingAction = { type:'sell', symbol, qty, value, stockPrice: stock.price };
    document.getElementById('modalTitle').innerText = 'Confirm Sell';
    document.getElementById('modalMsg').innerText = `Sell ${qty} shares of ${symbol} for $${value}?`;
    document.getElementById('modal').style.display = 'flex';
}

function confirmAction() {
    const pwd = document.getElementById('modalPwd').value;
    if(currentUser.password !== pwd) { alert('Wrong password'); return; }
    if(pendingAction.type === 'buy') {
        currentUser.cash -= pendingAction.cost;
        const existing = currentUser.portfolio.find(p => p.symbol === pendingAction.symbol);
        if(existing) {
            const newShares = existing.shares + pendingAction.qty;
            const newAvg = ((existing.avgPrice * existing.shares) + (pendingAction.stockPrice * pendingAction.qty)) / newShares;
            existing.shares = newShares;
            existing.avgPrice = newAvg;
        } else {
            currentUser.portfolio.push({ symbol: pendingAction.symbol, shares: pendingAction.qty, avgPrice: pendingAction.stockPrice });
        }
        currentUser.history.unshift({ date: new Date().toISOString(), symbol: pendingAction.symbol, type: 'BUY', shares: pendingAction.qty, price: pendingAction.stockPrice, total: pendingAction.cost });
    } else {
        currentUser.cash += pendingAction.value;
        const holding = currentUser.portfolio.find(p => p.symbol === pendingAction.symbol);
        holding.shares -= pendingAction.qty;
        if(holding.shares === 0) currentUser.portfolio = currentUser.portfolio.filter(p => p.symbol !== pendingAction.symbol);
        currentUser.history.unshift({ date: new Date().toISOString(), symbol: pendingAction.symbol, type: 'SELL', shares: pendingAction.qty, price: pendingAction.stockPrice, total: pendingAction.value });
    }
    const index = users.findIndex(u => u.id === currentUser.id);
    users[index] = currentUser;
    save();
    closeModal();
    loadDashboard();
    loadHoldings();
    loadHistory();
    alert('Trade completed!');
}

// PORTFOLIO
function loadHoldings() {
    if(!currentUser.portfolio.length) { document.getElementById('holdingsList').innerHTML = '<p>No holdings</p>'; return; }
    let html = '<table><thead><tr><th>Symbol</th><th>Shares</th><th>Avg</th><th>Current</th><th>Value</th><th>P&L</th></tr></thead><tbody>';
    currentUser.portfolio.forEach(p => {
        const s = stocks.find(x => x.symbol === p.symbol);
        const current = s ? s.price : 0;
        const value = current * p.shares;
        const pl = (current - p.avgPrice) * p.shares;
        html += `<tr><td>${p.symbol}</td><td>${p.shares}</td><td>$${p.avgPrice}</td><td>$${current}</td><td>$${value}</td><td class="${pl>=0?'price-up':'price-down'}">${pl>=0?'+':''}$${pl}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('holdingsList').innerHTML = html;
}

function loadHistory() {
    if(!currentUser.history.length) { document.getElementById('historyList').innerHTML = '<p>No transactions</p>'; return; }
    let html = '<table><thead><tr><th>Date</th><th>Symbol</th><th>Type</th><th>Shares</th><th>Price</th><th>Total</th></tr></thead><tbody>';
    currentUser.history.slice(0,10).forEach(h => {
        html += `<tr><td>${new Date(h.date).toLocaleDateString()}</td><td>${h.symbol}</td><td style="color:${h.type==='BUY'?'#00ff88':'#ff3b30'}">${h.type}</td><td>${h.shares}</td><td>$${h.price}</td><td>$${h.total}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('historyList').innerHTML = html;
}

// PROFILE
function loadProfile() {
    document.getElementById('editName').value = currentUser.username;
    document.getElementById('editEmail').value = currentUser.email;
}

function updateProfile() {
    currentUser.username = document.getElementById('editName').value;
    currentUser.email = document.getElementById('editEmail').value;
    const index = users.findIndex(u => u.id === currentUser.id);
    users[index] = currentUser;
    save();
    alert('Profile updated');
}

function changePwd() {
    const old = document.getElementById('oldPwd').value;
    const new1 = document.getElementById('newPwd').value;
    const new2 = document.getElementById('confirmPwd').value;
    if(currentUser.password !== old) { alert('Wrong current password'); return; }
    if(new1 !== new2) { alert('New passwords do not match'); return; }
    currentUser.password = new1;
    const index = users.findIndex(u => u.id === currentUser.id);
    users[index] = currentUser;
    save();
    alert('Password changed');
    document.getElementById('oldPwd').value = '';
    document.getElementById('newPwd').value = '';
    document.getElementById('confirmPwd').value = '';
}

// CASH
function deposit() {
    const amt = parseInt(document.getElementById('amountInput').value);
    if(!amt) return;
    window.location.href = 'mailto:kelsey@charterflow.store?subject=Deposit Request&body=I want to deposit $' + amt;
}
function withdraw() {
    const amt = parseInt(document.getElementById('amountInput').value);
    if(!amt) return;
    if(amt > currentUser.cash) { alert('Insufficient funds'); return; }
    window.location.href = 'mailto:kelsey@charterflow.store?subject=Withdrawal Request&body=I want to withdraw $' + amt;
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('modalPwd').value = '';
    pendingAction = null;
}

// Check session
if(currentUser) showPage('dashboard');
else showPage('auth');
</script>
</body>
</html>
