<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Holdings - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0c10;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: #ff3b30;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1a1c22;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number { font-size: 28px; font-weight: bold; color: #00ff88; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1c22;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th { background: #00ff88; color: black; }
        input, select {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #00ff88;
            color: black;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .error { color: #ff3b30; text-align: center; padding: 20px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: #1a1c22;
            cursor: pointer;
            border-radius: 5px;
        }
        .tab.active { background: #00ff88; color: black; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔒 APEX ADMIN PANEL</h1>
        <p>Password: ApexMaster2024</p>
    </div>

    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div>Total Users</div></div>
        <div class="stat-card"><div class="stat-number" id="totalCash">$0</div><div>Total Cash</div></div>
        <div class="stat-card"><div class="stat-number" id="totalTrades">0</div><div>Total Trades</div></div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('users')">Users</div>
        <div class="tab" onclick="showTab('stocks')">Stocks</div>
    </div>

    <div id="usersTab" class="tab-content active">
        <div id="usersList">Loading...</div>
    </div>

    <div id="stocksTab" class="tab-content">
        <div id="stocksList">Loading...</div>
    </div>
</div>

<script>
const ADMIN_SECRET = 'ApexMaster2024';

async function fetchAPI(endpoint) {
    try {
        const res = await fetch(`/api/admin/${ADMIN_SECRET}/${endpoint}`);
        const data = await res.json();
        console.log(endpoint, data);
        return data;
    } catch(e) {
        console.error(e);
        return null;
    }
}

async function loadStats() {
    const stats = await fetchAPI('stats');
    if(stats) {
        document.getElementById('totalUsers').innerText = stats.totalUsers || 0;
        document.getElementById('totalCash').innerText = '$' + (stats.totalCash || 0).toLocaleString();
        document.getElementById('totalTrades').innerText = stats.totalTrades || 0;
    }
}

async function loadUsers() {
    const users = await fetchAPI('users');
    if(users && users.length > 0) {
        let html = '<table><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Cash</th><th>Tier</th><th>Add Cash</th></tr></thead><tbody>';
        users.forEach(u => {
            let tierName = u.tier == 1 ? 'Bronze' : (u.tier == 2 ? 'Silver' : 'Gold');
            html += `<tr>
                <td>${u.id}</td>
                <td>${u.username}</td>
                <td>${u.email || '-'}</td>
                <td style="color:#00ff88">$${parseFloat(u.cash).toLocaleString()}</td>
                <td>${tierName}</td>
                <td><button onclick="addCash(${u.id})">+$1000</button> <button onclick="addCash5000(${u.id})">+$5000</button></td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('usersList').innerHTML = html;
    } else {
        document.getElementById('usersList').innerHTML = '<div class="error">No users found. Create an account first.</div>';
    }
    loadStats();
}

async function addCash(userId) {
    await fetch(`/api/admin/${ADMIN_SECRET}/user/${userId}/cash`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: 1000 })
    });
    alert('Added $1000');
    loadUsers();
}

async function addCash5000(userId) {
    await fetch(`/api/admin/${ADMIN_SECRET}/user/${userId}/cash`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: 5000 })
    });
    alert('Added $5000');
    loadUsers();
}

async function loadStocks() {
    const stocks = await fetchAPI('stocks');
    if(stocks && stocks.length > 0) {
        let html = '<table><thead><tr><th>Symbol</th><th>Name</th><th>Current Price</th><th>New Price</th><th>Action</th></tr></thead><tbody>';
        stocks.forEach(s => {
            html += `<tr>
                <td>${s.symbol}</td>
                <td>${s.name}</td>
                <td style="color:#00ff88">$${s.price.toFixed(2)}</td>
                <td><input type="number" id="price_${s.symbol}" step="0.01" placeholder="New price" style="width:100px"></td>
                <td><button onclick="updateStock('${s.symbol}')">Update</button></td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('stocksList').innerHTML = html;
    } else {
        document.getElementById('stocksList').innerHTML = '<div class="error">Error loading stocks</div>';
    }
}

async function updateStock(symbol) {
    const newPrice = document.getElementById(`price_${symbol}`).value;
    if(!newPrice) { alert('Enter a price'); return; }
    const stock = { symbol, name: symbol, price: parseFloat(newPrice) };
    await fetch(`/api/admin/${ADMIN_SECRET}/stock/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(stock)
    });
    alert('Stock updated!');
    loadStocks();
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tab + 'Tab').classList.add('active');
    if(tab === 'users') loadUsers();
    if(tab === 'stocks') loadStocks();
}

loadUsers();
loadStocks();
</script>
</body>
</html>
