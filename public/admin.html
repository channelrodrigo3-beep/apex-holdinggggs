<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Holdings - Admin Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Inter', sans-serif;
            background: #0a0c10;
            color: #e4e6eb;
            padding: 1rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #ff3b30, #cc2f24);
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
        }
        .header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-box {
            background: rgba(0,255,100,0.1);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }
        .stat-number { font-size: 1.5rem; font-weight: bold; color: #00ff88; }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }
        .tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            background: none;
            border: none;
            color: #8e9aaf;
            font-size: 0.9rem;
        }
        .tab.active { color: #00ff88; border-bottom: 2px solid #00ff88; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: rgba(20, 22, 27, 0.95);
            border: 1px solid rgba(0, 255, 100, 0.2);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .card h2 { color: #00ff88; font-size: 1.2rem; margin-bottom: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.3rem; color: #8e9aaf; font-size: 0.8rem; }
        input, select {
            width: 100%;
            padding: 0.6rem;
            background: #1a1c22;
            border: 1px solid rgba(0,255,100,0.2);
            border-radius: 8px;
            color: white;
        }
        button {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 0.5rem;
        }
        .btn-danger { background: linear-gradient(135deg, #ff3b30, #cc2f24); color: white; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #00ff88; }
        .alert {
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        .alert.success { background: rgba(0,255,100,0.1); border: 1px solid #00ff88; color: #00ff88; display: block; }
        .alert.error { background: rgba(255,59,48,0.1); border: 1px solid #ff3b30; color: #ff3b30; display: block; }
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .tabs { justify-content: center; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔒 APEX HOLDINGS ADMIN</h1>
        <p>Full control: Users, Tiers, Stocks, Transactions</p>
    </div>

    <div class="stats" id="stats">
        <div class="stat-box"><div class="stat-number" id="totalUsers">-</div><div class="stat-label">Users</div></div>
        <div class="stat-box"><div class="stat-number" id="totalCash">-</div><div class="stat-label">Total Cash</div></div>
        <div class="stat-box"><div class="stat-number" id="totalTrades">-</div><div class="stat-label">Trades</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('users')">👥 Users & Tiers</button>
        <button class="tab" onclick="showTab('stocks')">📈 Stocks</button>
        <button class="tab" onclick="showTab('transactions')">📋 Transactions</button>
    </div>

    <div id="usersTab" class="tab-content active">
        <div class="card">
            <h2>👤 Manage Users</h2>
            <div id="userAlert" class="alert"></div>
            <div class="grid">
                <div>
                    <h3>💰 Add Cash</h3>
                    <div class="form-group"><label>Select User</label><select id="cashUserId"></select></div>
                    <div class="form-group"><label>Amount ($)</label><input type="number" id="cashAmount"></div>
                    <button onclick="addCash()">Add Cash</button>
                </div>
                <div>
                    <h3>⭐ Change Tier</h3>
                    <div class="form-group"><label>Select User</label><select id="tierUserId"></select></div>
                    <div class="form-group"><label>New Tier</label>
                        <select id="newTier">
                            <option value="1">Bronze - $1,000 capital</option>
                            <option value="2">Silver - $5,000 capital</option>
                            <option value="3">Gold - $15,000 capital</option>
                        </select>
                    </div>
                    <button onclick="changeTier()">Update Tier & Capital</button>
                </div>
                <div>
                    <h3>🔄 Reset / Delete</h3>
                    <div class="form-group"><label>Select User</label><select id="resetUserId"></select></div>
                    <button onclick="resetUser()" class="btn-danger">Reset Account</button>
                    <button onclick="deleteUser()" class="btn-danger">Delete User</button>
                </div>
            </div>
            <div id="usersList"></div>
        </div>
    </div>

    <div id="stocksTab" class="tab-content">
        <div class="card">
            <h2>📈 Manage Stocks</h2>
            <div id="stockAlert" class="alert"></div>
            <div class="grid">
                <div>
                    <h3>✏️ Edit Stock</h3>
                    <div class="form-group"><label>Select Stock</label><select id="editStockSymbol" onchange="loadStock()"></select></div>
                    <div class="form-group"><label>Name</label><input type="text" id="editName"></div>
                    <div class="form-group"><label>Price ($)</label><input type="number" id="editPrice" step="0.01"></div>
                    <button onclick="updateStock()">Update Stock</button>
                    <button onclick="deleteStock()" class="btn-danger">Delete Stock</button>
                </div>
                <div>
                    <h3>➕ Add New Stock</h3>
                    <div class="form-group"><label>Symbol</label><input type="text" id="newSymbol" placeholder="e.g., NFLX"></div>
                    <div class="form-group"><label>Company Name</label><input type="text" id="newName"></div>
                    <div class="form-group"><label>Price ($)</label><input type="number" id="newPrice" step="0.01"></div>
                    <button onclick="addStock()">Add Stock</button>
                </div>
            </div>
            <div id="stocksList"></div>
        </div>
    </div>

    <div id="transactionsTab" class="tab-content">
        <div class="card">
            <h2>📋 All Transactions</h2>
            <div id="transactionsList"></div>
        </div>
    </div>
</div>

<script>
    const ADMIN_SECRET = 'ApexMaster2024';

    async function loadStats() {
        try {
            const res = await fetch(`/api/admin/${ADMIN_SECRET}/stats`);
            const stats = await res.json();
            document.getElementById('totalUsers').innerText = stats.totalUsers || 0;
            document.getElementById('totalCash').innerText = `$${(stats.totalCash || 0).toLocaleString()}`;
            document.getElementById('totalTrades').innerText = stats.totalTrades || 0;
        } catch(e) { console.log(e); }
    }

    async function loadUsers() {
        const res = await fetch(`/api/admin/${ADMIN_SECRET}/users`);
        const users = await res.json();
        
        const cashSelect = document.getElementById('cashUserId');
        const tierSelect = document.getElementById('tierUserId');
        const resetSelect = document.getElementById('resetUserId');
        
        cashSelect.innerHTML = '<option value="">Select user...</option>';
        tierSelect.innerHTML = '<option value="">Select user...</option>';
        resetSelect.innerHTML = '<option value="">Select user...</option>';
        
        users.forEach(u => {
            const tierName = u.tier == 1 ? 'Bronze' : u.tier == 2 ? 'Silver' : 'Gold';
            cashSelect.innerHTML += `<option value="${u.id}">${u.username} - $${(u.cash || 0).toLocaleString()} (${tierName})</option>`;
            tierSelect.innerHTML += `<option value="${u.id}">${u.username} - ${tierName} ($${(u.cash || 0).toLocaleString()})</option>`;
            resetSelect.innerHTML += `<option value="${u.id}">${u.username} - ${tierName}</option>`;
        });
        
        document.getElementById('usersList').innerHTML = `
            <table><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Cash</th><th>Tier</th><th>Joined</th></tr></thead>
            <tbody>${users.map(u => `<tr><td>${u.id}</td><td><strong>${u.username}</strong></td><td>${u.email}</td><td style="color:#00ff88">$${(u.cash || 0).toLocaleString()}</td><td>${u.tier == 1 ? '🥉 Bronze' : u.tier == 2 ? '🥈 Silver' : '🥇 Gold'}</td><td>${new Date(u.created_at).toLocaleDateString()}</td></tr>`).join('')}</tbody>
            </table>
        `;
    }

    async function addCash() {
        const userId = document.getElementById('cashUserId').value;
        const amount = parseFloat(document.getElementById('cashAmount').value);
        if (!userId || !amount) return alert('Select user and enter amount');
        await fetch(`/api/admin/${ADMIN_SECRET}/user/${userId}/cash`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount })
        });
        showAlert('userAlert', `Added $${amount}`, 'success');
        loadUsers();
        loadStats();
    }

    async function changeTier() {
        const userId = document.getElementById('tierUserId').value;
        const tier = parseInt(document.getElementById('newTier').value);
        if (!userId) return alert('Select user');
        const res = await fetch(`/api/admin/${ADMIN_SECRET}/user/${userId}/tier`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tier })
        });
        const data = await res.json();
        showAlert('userAlert', `Tier changed to ${data.tierName} with $${data.newCash.toLocaleString()} capital`, 'success');
        loadUsers();
        loadStats();
    }

    async function resetUser() {
        const userId = document.getElementById('resetUserId').value;
        if (!userId || !confirm('Reset this user?')) return;
        await fetch(`/api/admin/${ADMIN_SECRET}/user/${userId}/reset`, { method: 'POST' });
        showAlert('userAlert', 'User reset to tier capital', 'success');
        loadUsers();
        loadStats();
    }

    async function deleteUser() {
        const userId = document.getElementById('resetUserId').value;
        if (!userId || !confirm('PERMANENTLY DELETE this user?')) return;
        await fetch(`/api/admin/${ADMIN_SECRET}/user/${userId}`, { method: 'DELETE' });
        showAlert('userAlert', 'User deleted', 'success');
        loadUsers();
        loadStats();
    }

    async function loadStocks() {
        const res = await fetch(`/api/admin/${ADMIN_SECRET}/stocks`);
        const stocks = await res.json();
        const select = document.getElementById('editStockSymbol');
        select.innerHTML = '<option value="">Select stock...</option>';
        stocks.forEach(s => {
            select.innerHTML += `<option value="${s.symbol}">${s.symbol} - ${s.name}</option>`;
        });
        document.getElementById('stocksList').innerHTML = `
            <table><thead><tr><th>Symbol</th><th>Name</th><th>Price</th></tr></thead>
            <tbody>${stocks.map(s => `<tr><td><strong>${s.symbol}</strong></td><td>${s.name}</td><td style="color:#00ff88">$${s.price.toFixed(2)}</td></tr>`).join('')}</tbody>
            </table>
        `;
    }

    async function loadStock() {
        const symbol = document.getElementById('editStockSymbol').value;
        if (!symbol) return;
        const res = await fetch(`/api/admin/${ADMIN_SECRET}/stocks`);
        const stocks = await res.json();
        const stock = stocks.find(s => s.symbol === symbol);
        if (stock) {
            document.getElementById('editName').value = stock.name;
            document.getElementById('editPrice').value = stock.price;
        }
    }

    async function updateStock() {
        const symbol = document.getElementById('editStockSymbol').value;
        const name = document.getElementById('editName').value;
        const price = parseFloat(document.getElementById('editPrice').value);
        if (!symbol || !price) return alert('Select stock and enter price');
        await fetch(`/api/admin/${ADMIN_SECRET}/stock/update`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symbol, name, price })
        });
        showAlert('stockAlert', 'Stock updated!', 'success');
        loadStocks();
    }

    async function deleteStock() {
        const symbol = document.getElementById('editStockSymbol').value;
        if (!symbol || !confirm(`Delete ${symbol}?`)) return;
        await fetch(`/api/admin/${ADMIN_SECRET}/stock/delete`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symbol })
        });
        showAlert('stockAlert', 'Stock deleted', 'success');
        loadStocks();
    }

    async function addStock() {
        const symbol = document.getElementById('newSymbol').value.toUpperCase();
        const name = document.getElementById('newName').value;
        const price = parseFloat(document.getElementById('newPrice').value);
        if (!symbol || !name || !price) return alert('Fill all fields');
        await fetch(`/api/admin/${ADMIN_SECRET}/stock/add`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symbol, name, price })
        });
        showAlert('stockAlert', 'Stock added!', 'success');
        document.getElementById('newSymbol').value = '';
        document.getElementById('newName').value = '';
        document.getElementById('newPrice').value = '';
        loadStocks();
    }

    async function loadTransactions() {
        const res = await fetch(`/api/admin/${ADMIN_SECRET}/transactions`);
        const transactions = await res.json();
        document.getElementById('transactionsList').innerHTML = `
            <table><thead><tr><th>Date</th><th>User</th><th>Symbol</th><th>Type</th><th>Shares</th><th>Price</th><th>Total</th></thead>
            <tbody>${transactions.slice(0, 50).map(t => `


                 <tr><td>${new Date(t.date).toLocaleString()}</td><td><strong>${t.username}</strong></td><td>${t.symbol}</td><td style="color:${t.type === 'BUY' ? '#00ff88' : '#ff3b30'}">${t.type}</td><td>${t.shares}</td><td>$${t.price.toFixed(2)}</td><td>$${t.total.toFixed(2)}</td></tr>
            `).join('')}</tbody>
        <\/table>
        `;
    }

    function showAlert(elementId, message, type) {
        const alertDiv = document.getElementById(elementId);
        alertDiv.textContent = message;
        alertDiv.className = `alert ${type}`;
        setTimeout(() => { alertDiv.className = 'alert'; }, 3000);
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`${tab}Tab`).classList.add('active');
        event.target.classList.add('active');
        if (tab === 'users') { loadUsers(); loadStats(); }
        if (tab === 'stocks') loadStocks();
        if (tab === 'transactions') loadTransactions();
    }

    loadStats();
    loadUsers();
    loadStocks();
    loadTransactions();
</script>
</body>
</html>
